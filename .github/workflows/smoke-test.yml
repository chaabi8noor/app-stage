name: Deployment smoke test

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: HTTPS URL of the deployed Vercel frontend
        required: true
        type: string
      api_url:
        description: HTTPS URL of the deployed Railway API
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Verify deployed frontend and API
    runs-on: ubuntu-latest
    steps:
      - name: Verify frontend is reachable
        run: curl --fail --location --retry 3 --retry-delay 5 --connect-timeout 10 "${{ inputs.frontend_url }}"
      - name: Verify API liveness
        run: curl --fail --location --retry 3 --retry-delay 5 --connect-timeout 10 "${{ inputs.api_url }}/health"
      - name: Verify API readiness and database connectivity
        run: curl --fail --location --retry 3 --retry-delay 5 --connect-timeout 10 "${{ inputs.api_url }}/ready"
