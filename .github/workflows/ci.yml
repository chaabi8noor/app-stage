name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "devops/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  backend:
    name: Backend and migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: internapp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d internapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/internapp
      FRONTEND_URL: http://localhost:3000
      SECRET_KEY: ci-only-not-a-production-secret
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall -q app
      - run: python -m unittest discover -s tests -p "test_*.py"
      - run: alembic upgrade head
      - run: alembic current

  container-build:
    name: Container build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build --tag app-stage-backend:ci ./backend
      - run: docker build --build-arg VITE_API_URL=https://api.example.invalid --tag app-stage-frontend:ci ./frontend
      - name: Scan backend image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: app-stage-backend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
      - name: Scan frontend image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: app-stage-frontend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

  compose-config:
    name: Compose configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cp .env.example .env
      - run: docker compose config --quiet
