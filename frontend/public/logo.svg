<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Blue background -->
  <rect width="200" height="200" fill="#1a6bbf"/>
  <!-- Outer ring -->
  <circle cx="100" cy="88" r="58" fill="none" stroke="#1a1a2e" stroke-width="6"/>
  <!-- Inner dark circle -->
  <circle cx="100" cy="88" r="52" fill="#1a1a2e"/>
  <!-- Bar chart bars -->
  <rect x="68" y="98" width="12" height="22" rx="2" fill="white"/>
  <rect x="84" y="86" width="12" height="34" rx="2" fill="white"/>
  <rect x="100" y="76" width="12" height="44" rx="2" fill="white"/>
  <rect x="116" y="90" width="12" height="30" rx="2" fill="white"/>
  <!-- Trend line -->
  <polyline points="68,98 84,82 100,72 116,84 132,74" fill="none" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gear (top-left of circle) -->
  <g transform="translate(78,62) scale(0.7)">
    <circle cx="16" cy="16" r="6" fill="none" stroke="white" stroke-width="2.5"/>
    <path d="M16 4 L17.5 8.5 L21 6.5 L21 10 L25 11 L22.5 14 L25.5 17 L22 17.5 L21.5 21.5 L18 19.5 L16 23 L14 19.5 L10.5 21.5 L10 17.5 L6.5 17 L9.5 14 L7 11 L11 10 L11 6.5 L14.5 8.5 Z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <!-- Dollar/coin symbol inside gear -->
  <text x="84" y="70" text-anchor="middle" font-size="10" fill="white" font-family="Arial" font-weight="bold">$</text>
  <!-- 3LM SOLUTIONS text -->
  <text x="100" y="165" text-anchor="middle" font-size="18" fill="white" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="2">3LM SOLUTIONS</text>
</svg>
